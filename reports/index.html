<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PR Snapshot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    th.sortable:hover { background-color: rgba(255,255,255,0.07); }
    th.sortable .sort-icon { opacity: 0.35; font-size: 0.75em; margin-left: 4px; }
    th.sortable.sort-asc .sort-icon::after  { content: '▲'; opacity: 1; }
    th.sortable.sort-desc .sort-icon::after { content: '▼'; opacity: 1; }
    th.sortable:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: '⇅'; }
    .badge-readiness { font-size: 0.8em; min-width: 3.2em; display: inline-block; text-align: center; }
    #areaFilterPanel .area-list { max-height: 240px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="container-fluid py-3">
    <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
      <div class="me-auto">
        <h1 class="h4 mb-0">Open PR Snapshot</h1>
        <div class="text-secondary small" id="meta">Loading…</div>
      </div>

      <div class="btn-group" role="group" aria-label="Filter controls">
        <button class="btn btn-outline-warning" type="button" data-bs-toggle="collapse" data-bs-target="#areaFilterPanel" aria-expanded="false" aria-controls="areaFilterPanel">Area Filter</button>
        <button class="btn btn-outline-warning btn-sm" type="button" id="areaSelectAllBtn">All</button>
      </div>

      <div class="btn-group" role="group" aria-label="Column controls">
        <button class="btn btn-outline-light" type="button" data-bs-toggle="collapse" data-bs-target="#columnsPanel" aria-expanded="false" aria-controls="columnsPanel">Columns</button>
        <button class="btn btn-outline-light btn-sm" type="button" id="checkAllBtn">All</button>
      </div>

      <button class="btn btn-outline-info" type="button" id="resetBtn">Reset</button>
    </div>

    <!-- Area path filter panel -->
    <div class="collapse" id="areaFilterPanel">
      <div class="card mb-3 border-warning">
        <div class="card-header text-warning-emphasis bg-transparent border-warning py-2 small fw-semibold">Filter by Area Path</div>
        <div class="card-body py-2">
          <div class="area-list row row-cols-1 row-cols-md-2 row-cols-lg-3 g-1" id="areaCheckboxes"></div>
        </div>
      </div>
    </div>

    <!-- Column chooser panel -->
    <div class="collapse" id="columnsPanel">
      <div class="card mb-3">
        <div class="card-body">
          <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-2" id="columns"></div>
        </div>
      </div>
    </div>

    <div id="status" class="alert alert-secondary py-2" role="status">Loading snapshot JSON…</div>

    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle">
        <thead>
          <tr id="thead"></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <script>
    const SNAPSHOT_URL = './pr-area-snapshot.latest.json';

    const metaEl         = document.getElementById('meta');
    const statusEl       = document.getElementById('status');
    const columnsEl      = document.getElementById('columns');
    const theadEl        = document.getElementById('thead');
    const tbodyEl        = document.getElementById('tbody');
    const areaCheckboxEl = document.getElementById('areaCheckboxes');

    const resetBtn         = document.getElementById('resetBtn');
    const checkAllBtn      = document.getElementById('checkAllBtn');
    const areaSelectAllBtn  = document.getElementById('areaSelectAllBtn');

    const escapeHtml = (value) => {
      const str = value == null ? '' : String(value);
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    };

    const toBool = (v) => v === true;

    // Returns a Bootstrap badge for readiness score
    function readinessBadge(score) {
      const n = Number(score) || 0;
      const cls = n >= 75 ? 'bg-success' : n >= 45 ? 'bg-warning text-dark' : 'bg-danger';
      return `<span class="badge badge-readiness ${cls}">${n}%</span>`;
    }

    const columns = [
      { key: 'prId',                   label: 'PR',               value: (pr) => pr.prId,                          thClass: 'text-nowrap', tdClass: 'text-nowrap' },
      { key: 'title',                  label: 'Title',            value: (pr) => pr.title ?? '' },
      { key: 'repository',             label: 'Repo',             value: (pr) => pr.repository ?? '',              thClass: 'text-nowrap', tdClass: 'text-nowrap' },
      { key: 'createdBy',              label: 'Author',           value: (pr) => pr.createdBy ?? '',               thClass: 'text-nowrap', tdClass: 'text-nowrap' },
      { key: 'ageDays',                label: 'Age (days)',       value: (pr) => pr.ageDays,                       thClass: 'text-nowrap', tdClass: 'text-nowrap text-end' },
      { key: 'isDraft',                label: 'Draft',            value: (pr) => toBool(pr.isDraft) ? 'Yes' : 'No', thClass: 'text-nowrap', tdClass: 'text-nowrap' },
      { key: 'reviewersSummary',       label: 'Reviewers',        value: (pr) => pr.reviewers?.summary ?? '',      thClass: 'text-nowrap' },
      {
        key: 'threads',
        label: 'Threads',
        value: (pr) => `${pr.threadCounts?.active ?? 0}/${pr.threadCounts?.total ?? 0}`,
        sortValue: (pr) => ((pr.threadCounts?.active ?? 0) * 100000) + (pr.threadCounts?.total ?? 0),
        thClass: 'text-nowrap',
        tdClass: 'text-nowrap text-end'
      },
      { key: 'linkedWorkItemId',       label: 'WI',               value: (pr) => pr.linkedWorkItem?.id ?? '',      thClass: 'text-nowrap', tdClass: 'text-nowrap' },
      { key: 'linkedWorkItemType',     label: 'WI Type',          value: (pr) => pr.linkedWorkItem?.type ?? '',    thClass: 'text-nowrap', tdClass: 'text-nowrap' },
      { key: 'linkedWorkItemState',    label: 'WI State',         value: (pr) => pr.linkedWorkItem?.state ?? '',   thClass: 'text-nowrap', tdClass: 'text-nowrap' },
      { key: 'linkedWorkItemAreaPaths',label: 'WI Area Path(s)',  value: (pr) => pr.linkedWorkItemAreaPaths ?? '' },
      { key: 'readinessScore',         label: 'Readiness',        value: (pr) => pr.readinessScore ?? 0,           thClass: 'text-nowrap', tdClass: 'text-nowrap text-end', html: (pr) => readinessBadge(pr.readinessScore ?? 0) },
      { key: 'aiSummary',              label: 'AI Summary',       value: (pr) => pr.aiSummary ?? '' },
      { key: 'url',                    label: 'PR Link',          value: (pr) => pr.url ?? '',                     thClass: 'text-nowrap', tdClass: 'text-nowrap' },
    ];

    const defaultVisible = new Set([
      'prId', 'title', 'repository', 'createdBy', 'ageDays',
      'reviewersSummary', 'threads',
      'linkedWorkItemId', 'linkedWorkItemAreaPaths',
      'readinessScore', 'aiSummary', 'url',
    ]);

    let snapshot        = null;
    let visible         = new Set(defaultVisible);
    let selectedAreas   = new Set();   // empty = show all
    let sortKey         = null;
    let sortDir         = 'asc';       // 'asc' | 'desc'

    // -------------------------------------------------------------------------
    // Status
    // -------------------------------------------------------------------------
    function setStatus(kind, text) {
      statusEl.className = `alert alert-${kind} py-2`;
      statusEl.textContent = text;
    }

    // -------------------------------------------------------------------------
    // Area filter
    // -------------------------------------------------------------------------
    function allAreaPaths() {
      if (!snapshot) return [];
      const paths = new Set();
      for (const pr of snapshot.pullRequests ?? []) {
        const raw = pr.linkedWorkItemAreaPaths ?? '';
        for (const p of raw.split(',').map(s => s.trim()).filter(Boolean)) paths.add(p);
      }
      return [...paths].sort();
    }

    function renderAreaFilter() {
      const areas = allAreaPaths();
      areaCheckboxEl.innerHTML = '';

      for (const area of areas) {
        const id = `area_${CSS.escape(area)}`;
        const checked = selectedAreas.size === 0 || selectedAreas.has(area);

        const wrapper = document.createElement('div');
        wrapper.className = 'col';
        wrapper.innerHTML = `
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="${escapeHtml(id)}" ${checked ? 'checked' : ''} data-area="${escapeHtml(area)}">
            <label class="form-check-label small" for="${escapeHtml(id)}">${escapeHtml(area)}</label>
          </div>`;

        wrapper.querySelector('input').addEventListener('change', () => {
          rebuildSelectedAreas();
          renderTable();
        });

        areaCheckboxEl.appendChild(wrapper);
      }
    }

    function rebuildSelectedAreas() {
      const checked = [...areaCheckboxEl.querySelectorAll('input[type=checkbox]:checked')].map(el => el.dataset.area);
      const all = allAreaPaths();
      // If everything is checked, treat as "no filter" for cleanliness
      selectedAreas = checked.length === all.length ? new Set() : new Set(checked);
    }

    function selectAllAreas() {
      areaCheckboxEl.querySelectorAll('input[type=checkbox]').forEach(el => { el.checked = true; });
      selectedAreas = new Set();
      renderTable();
    }

    areaSelectAllBtn.addEventListener('click',  () => selectAllAreas());

    function prMatchesAreaFilter(pr) {
      if (selectedAreas.size === 0) return true;
      const raw = pr.linkedWorkItemAreaPaths ?? '';
      const prAreas = raw.split(',').map(s => s.trim()).filter(Boolean);
      if (prAreas.length === 0) return selectedAreas.size === 0;
      return prAreas.some(a => selectedAreas.has(a));
    }

    // -------------------------------------------------------------------------
    // Column chooser
    // -------------------------------------------------------------------------
    function renderColumnChooser() {
      columnsEl.innerHTML = '';

      for (const col of columns) {
        const id = `col_${col.key}`;
        const checked = visible.has(col.key);

        const wrapper = document.createElement('div');
        wrapper.className = 'col';
        wrapper.innerHTML = `
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="${id}" ${checked ? 'checked' : ''}>
            <label class="form-check-label" for="${id}">${escapeHtml(col.label)}</label>
          </div>`;

        wrapper.querySelector('input').addEventListener('change', (e) => {
          if (e.target.checked) visible.add(col.key);
          else visible.delete(col.key);
          renderTable();
        });

        columnsEl.appendChild(wrapper);
      }
    }

    // -------------------------------------------------------------------------
    // Sorting
    // -------------------------------------------------------------------------
    function sortedPrs(prs) {
      if (!sortKey) return prs;
      const col = columns.find(c => c.key === sortKey);
      if (!col) return prs;

      return [...prs].sort((a, b) => {
        let av = col.sortValue ? col.sortValue(a) : col.value(a);
        let bv = col.sortValue ? col.sortValue(b) : col.value(b);
        // Numeric comparison when both are numbers
        if (typeof av === 'number' && typeof bv === 'number') {
          return sortDir === 'asc' ? av - bv : bv - av;
        }
        av = String(av ?? '').toLowerCase();
        bv = String(bv ?? '').toLowerCase();
        const cmp = av < bv ? -1 : av > bv ? 1 : 0;
        return sortDir === 'asc' ? cmp : -cmp;
      });
    }

    function handleSort(key) {
      if (sortKey === key) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortKey = key;
        sortDir = 'asc';
      }
      renderTable();
    }

    // -------------------------------------------------------------------------
    // Table render
    // -------------------------------------------------------------------------
    function renderTable() {
      if (!snapshot) return;

      const allPrs = Array.isArray(snapshot.pullRequests) ? snapshot.pullRequests : [];
      const filtered = allPrs.filter(prMatchesAreaFilter);
      const prs = sortedPrs(filtered);

      // Header
      theadEl.innerHTML = '';
      for (const col of columns) {
        if (!visible.has(col.key)) continue;
        const th = document.createElement('th');
        th.scope = 'col';

        const baseClass = col.thClass ?? '';
        const sortClass = sortKey === col.key ? `sort-${sortDir}` : '';
        th.className = `${baseClass} sortable ${sortClass}`.trim();

        th.innerHTML = `${escapeHtml(col.label)}<span class="sort-icon"></span>`;
        th.dataset.key = col.key;
        th.addEventListener('click', () => handleSort(col.key));
        theadEl.appendChild(th);
      }

      // Body
      tbodyEl.innerHTML = '';
      for (const pr of prs) {
        const tr = document.createElement('tr');

        for (const col of columns) {
          if (!visible.has(col.key)) continue;

          const td = document.createElement('td');
          if (col.tdClass) td.className = col.tdClass;

          if (col.key === 'url') {
            const url = col.value(pr);
            if (url) td.innerHTML = `<a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">Open</a>`;
          } else if (col.html) {
            td.innerHTML = col.html(pr);
          } else {
            const v = col.value(pr);
            td.textContent = v == null ? '' : String(v);
          }

          tr.appendChild(td);
        }

        tbodyEl.appendChild(tr);
      }

      const areaLabel = snapshot.area ?? '';
      const date = snapshot.snapshotDate ?? '';
      metaEl.textContent = `${prs.length} / ${allPrs.length} PR(s) • snapshotDate: ${date}${areaLabel ? ` • area: ${areaLabel}` : ''}`;
      setStatus('secondary', `Showing ${prs.length} of ${allPrs.length} PR(s) from ${SNAPSHOT_URL}`);
    }

    // -------------------------------------------------------------------------
    // Load
    // -------------------------------------------------------------------------
    async function loadSnapshot() {
      setStatus('secondary', `Loading ${SNAPSHOT_URL}…`);
      metaEl.textContent = 'Loading…';
      snapshot = null;
      // Reset view state on load
      visible = new Set(defaultVisible);
      selectedAreas = new Set();
      sortKey = null;
      sortDir = 'asc';

      const res = await fetch(SNAPSHOT_URL, { cache: 'no-store' });
      if (!res.ok) {
        setStatus('danger', `Failed to load JSON: ${res.status} ${res.statusText}`);
        return;
      }

      snapshot = await res.json();
      renderColumnChooser();
      renderAreaFilter();
      renderTable();
    }

    resetBtn.addEventListener('click', () => loadSnapshot());

    checkAllBtn.addEventListener('click', () => {
      visible = new Set(columns.map(c => c.key));
      renderColumnChooser();
      renderTable();
    });

    loadSnapshot().catch(err => {
      console.error(err);
      setStatus('danger', 'Unexpected error loading snapshot JSON.');
    });
  </script>
</body>
</html>
